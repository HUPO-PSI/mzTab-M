name: Spec Build Workflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_call:

env:
  DOC_IN: "${{ github.workspace }}/specification_documents"
  DOC_OUT: "${{ github.workspace }}/specification_documents/output"
  DOC_FILE: 'mzTab_format_specification_2_1-M.adoc'
  RELEASE_DIR: '2_1-metabolomics-release'

jobs:
  build-spec:
    runs-on: ubuntu-24.04
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set build timestamp
        run: echo "BUILD_DATE=$(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_ENV
      
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y pandoc
      
      - name: Pull Asciidoctor Docker image
        run: docker pull asciidoctor/docker-asciidoctor:1
      
      - name: Build specification documents
        run: |
          ./build-docs.sh \
            -i "$DOC_IN" \
            -o "$DOC_OUT" \
            -c "$GITHUB_SHA" \
            -d "$BUILD_DATE" \
            -f "$DOC_FILE"
        shell: bash
      
      - name: Prepare output directory
        run: |
          mkdir -p output/$RELEASE_DIR/img
          cp -v -R $DOC_OUT/* output/$RELEASE_DIR/
          cp -v -R $DOC_OUT/img/* output/$RELEASE_DIR/img/
          cp -v -R docs/* output/
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: specification-documents
          path: |
            output/${{ env.RELEASE_DIR }}/*.pdf
            output/${{ env.RELEASE_DIR }}/*.html
            output/${{ env.RELEASE_DIR }}/*.docx
          retention-days: 90

  build-docs:
    name: Build Antora documentation
    needs: build-spec
    # Skip in workflow_call context — release.yml has its own publish-site job
    if: github.event_name != 'workflow_call'
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch all remote branches
        run: git fetch --all

      - name: Create local tracking branches for existing release versions
        run: |
          for branch in $(git branch -r | grep 'origin/v' | sed 's|.*origin/||'); do
            git branch "$branch" "origin/$branch" 2>/dev/null || true
          done

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Antora and extensions
        run: npm ci

      - name: Build Antora site
        env:
          ANTORA_EDIT_BRANCH: main
        run: |
          npx antora antora-playbook.yml \
            --attribute "commit-hash=${{ github.sha }}" \
            --attribute "build-date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/site/

  deploy-docs:
    name: Deploy documentation to GitHub Pages
    needs: build-docs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
